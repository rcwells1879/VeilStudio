name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types:
      - veilpix-updated
      - veilchat-updated

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout VeilStudio
        uses: actions/checkout@v4
        with:
          path: veilstudio

      - name: Checkout VeilPix
        uses: actions/checkout@v4
        with:
          repository: rcwells1879/veilpix
          path: veilpix
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source_repo == 'veilpix' && github.event.client_payload.source_sha || 'main' }}

      - name: Checkout VeilChat
        uses: actions/checkout@v4
        with:
          repository: rcwells1879/veil-chat
          path: veilchat
          ref: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source_repo == 'veil-chat' && github.event.client_payload.source_sha || 'main' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Install VeilStudio dependencies
        working-directory: veilstudio
        run: npm ci

      - name: Build VeilStudio
        working-directory: veilstudio
        run: npm run build

      - name: Install VeilPix dependencies
        working-directory: veilpix
        run: npm ci

      - name: Build VeilPix
        working-directory: veilpix
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_BASE_URL: https://api.veilstudio.io
        run: npm run build

      - name: Install VeilChat dependencies
        working-directory: veilchat
        run: npm ci

      - name: Build VeilChat
        working-directory: veilchat
        run: npm run build

      - name: Assemble Cloudflare Pages artifact
        run: >
          node veilstudio/scripts/assemble-cloudflare-pages.mjs
          --studio veilstudio/out
          --veilpix veilpix/dist
          --veilchat veilchat/dist
          --out cloudflare-pages

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy cloudflare-pages --project-name=veilstudio --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
